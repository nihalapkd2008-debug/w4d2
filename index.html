<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functional Programming Project</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>JavaScript Functional Programming</h1>

    <hr>

    <!-- Passed Students -->

    <section>

        <h2>1. Passed Students (Filter)</h2>

        <button id="showStudents">
            Show Passed Students
        </button>

        <ul id="studentList"></ul>

    </section>

    <hr>

    <!-- Shopping Cart -->

    <section>

        <h2>2. Shopping Cart Total (Reduce)</h2>

        <button id="cartBtn">
            Calculate Total
        </button>

        <h3 id="cartTotal"></h3>

    </section>

    <hr>

    <!-- Products -->

    <section>

        <h2>3. Sort Products By Price</h2>

        <button id="sortAsc">
            Sort Ascending
        </button>

        <button id="sortDesc">
            Sort Descending
        </button>

        <div id="productContainer"></div>

    </section>

    <hr>

    <!-- Dashboard -->

    <section>

        <h2>4. Dashboard Statistics (Method Chaining)</h2>

        <button id="dashboardBtn">
            Generate Dashboard
        </button>

        <div id="dashboard"></div>

    </section>

    <script src="script.js"></script>

</body>

</html>
